<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SIGWX Vertical Profile</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
  margin: 0;
  background: white;
  font-family: "Courier New", monospace;
}

.grid line { stroke: #cfd6dd; }
.grid-vertical line { stroke-dasharray: 4,4; }

.flight-path {
  stroke: black;
  stroke-width: 3;
  fill: none;
}

.freezing-line {
  stroke: #2980b9;
  stroke-width: 2;
  stroke-dasharray: 8,4;
  fill: none;
}

.marker {
  fill: red;
  font-size: 11px;
  text-anchor: middle;
}

.turb-symbol {
  font-size: 18px;
  fill: #d35400;
}

.icing-symbol {
  font-size: 14px;
  fill: #00e5ff;
}
</style>
</head>

<body>

<div style="padding:10px; font-weight:bold;">
  Flight Weather Profile
</div>

<!-- FILE INPUT (NEW) -->
<div style="padding:10px;">
  Load airports.csv:
  <input type="file" id="fileInput" accept=".csv" />
</div>

<svg id="chart" width="1000" height="420"></svg>

<script>

// ========= CONFIG =========
const startICAO = "CYQT";
const endICAO   = "CYUL";
// ==========================

const svg = d3.select("#chart").style("background","white");

const margin = {top:20,right:60,bottom:70,left:80};
const width = 1000 - margin.left - margin.right;
const height = 420 - margin.top - margin.bottom;

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${margin.top})`);

const y = d3.scaleLinear().domain([0,500]).range([height,0]);
const x = d3.scaleLinear().domain([-5,75]).range([0,width]);

// GRID
g.append("g")
  .attr("class","grid")
  .call(d3.axisLeft(y).tickValues(d3.range(0,501,100)).tickSize(-width).tickFormat(""));

g.append("g")
  .attr("class","grid grid-vertical")
  .attr("transform",`translate(0,${height})`)
  .call(d3.axisBottom(x).tickValues(d3.range(0,71,10)).tickSize(-height).tickFormat(""));

// AXES
g.append("g")
  .call(d3.axisLeft(y).tickValues(d3.range(0,501,100)).tickFormat(d=>"FL"+d));

const startTime = new Date(Date.now() + 6*3600000);

g.append("g")
  .attr("transform",`translate(0,${height})`)
  .call(
    d3.axisBottom(x)
      .tickValues(d3.range(0,71,10))
      .tickFormat(d=>{
        const t = new Date(startTime.getTime()+d*60000);
        return t.toISOString().substring(11,16)+"Z";
      })
  );

// COLOR SCALES
const cloudColor = d3.scaleLinear()
  .domain([0,50,100])
  .range(["rgba(255,255,255,0)", "rgba(140,140,160,0.3)", "rgba(80,80,100,0.7)"]);

const turbColor = d3.scaleLinear()
  .domain([20,40,80])
  .range(["rgba(255,255,0,0)", "rgba(255,165,0,0.4)", "rgba(255,0,0,0.5)"])
  .clamp(true);

const precipColor = d3.scaleLinear()
  .domain([0,2,10])
  .range([
    "rgba(0,0,255,0)",
    "rgba(0,150,255,0.3)",
    "rgba(0,0,200,0.6)"
  ])
  .clamp(true);

const icingColor = d3.scaleLinear()
  .domain([0,1])
  .range([
    "rgba(0,255,255,0)",
    "rgba(255,0,255,0.35)"
  ]);

const samples = 15;

const levels = [
  {p:"1000hPa", fl:30},
  {p:"925hPa",  fl:70},
  {p:"850hPa",  fl:150},
  {p:"700hPa",  fl:300},
  {p:"600hPa",  fl:400},
  {p:"500hPa",  fl:500}
];

function interp(a,b,t){ return a + (b-a)*t; }

// ========= LOAD CSV VIA FILE INPUT =========
function loadAirportsFromFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = function(e) {
      const text = e.target.result;
      const data = d3.csvParse(text);

      const map = {};

      data.forEach(d => {
        if (d.ident) {
          map[d.ident] = {
            lat: +d.latitude_deg,
            lon: +d.longitude_deg
          };
        }
      });

      resolve(map);
    };

    reader.onerror = reject;
    reader.readAsText(file);
  });
}

// ========= WEATHER =========
async function loadWeather(start, end){

  let field = [];

  for(let i=0; i<samples; i++){
    const t = i/(samples-1);
    const lat = start.lat + (end.lat-start.lat)*t;
    const lon = start.lon + (end.lon-start.lon)*t;

    const cVars = levels.map(l=>"cloudcover_"+l.p).join(",");
    const wVars = levels.map(l=>"windspeed_"+l.p).join(",");
    const tVars = levels.map(l=>"temperature_"+l.p).join(",");

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=${cVars},${wVars},${tVars},precipitation&wind_speed_unit=kn&forecast_days=1`;

    const res = await fetch(url);
    const data = await res.json();

    let column = [];

    levels.forEach(l=>{
      column.push({
        fl: l.fl,
        cloud: data.hourly["cloudcover_"+l.p][0],
        wind: data.hourly["windspeed_"+l.p][0],
        temp: data.hourly["temperature_"+l.p][0]
      });
    });

    const precip = data.hourly.precipitation[0];

    field.push({ time: t*70, column, precip });
  }

  drawWeather(field);
  drawFreezingLine(field);
  drawFlightPath();

  // ICAO labels centered
  g.append("text")
    .attr("x", x(0))
    .attr("y", height + 35)
    .attr("text-anchor","middle")
    .text(startICAO);

  g.append("text")
    .attr("x", x(70))
    .attr("y", height + 35)
    .attr("text-anchor","middle")
    .text(endICAO);
}

// ========= DRAW WEATHER =========
function drawWeather(field) {
  const dy = 20;

  for(let i=0; i<field.length-1; i++){
    const c1 = field[i];
    const c2 = field[i+1];

    const xPos = x(c1.time);
    const rectWidth = x(c2.time) - x(c1.time) + 1;

    for(let alt=0; alt<500; alt+=dy){

      const topAlt = Math.min(alt+dy, 500);

      const getVals = (col, alt) => {
        for(let j=0; j<col.length-1; j++){
          if(alt>=col[j].fl && alt<=col[j+1].fl){
            const t = (alt-col[j].fl)/(col[j+1].fl-col[j].fl);
            return {
              cloud: interp(col[j].cloud, col[j+1].cloud, t),
              wind: interp(col[j].wind, col[j+1].wind, t),
              temp: interp(col[j].temp, col[j+1].temp, t)
            };
          }
        }
        return {cloud:0, wind:0, temp:0};
      };

      const v1 = getVals(c1.column, alt);
      const v2 = getVals(c2.column, alt);

      const avgCloud = (v1.cloud + v2.cloud) / 2;
      const avgWind  = (v1.wind + v2.wind) / 2;
      const avgTemp  = (v1.temp + v2.temp) / 2;
      const avgPrecip = (c1.precip + c2.precip) / 2;

      const rect = () => g.append("rect")
        .attr("x", xPos)
        .attr("y", y(topAlt))
        .attr("width", rectWidth)
        .attr("height", Math.abs(y(alt) - y(topAlt)));

      rect().attr("fill", cloudColor(avgCloud));

      if (avgCloud > 60 && avgTemp <= 0 && avgTemp >= -20)
        rect().attr("fill", icingColor(1));

      if (avgPrecip > 0.1)
        rect().attr("fill", precipColor(avgPrecip));

      if (avgWind > 25)
        rect().attr("fill", turbColor(Math.min(avgWind,80)));

      if (avgWind > 45 && i % 2 === 0 && alt % 60 === 0) {
        g.append("text")
          .attr("x", xPos + rectWidth/2)
          .attr("y", y(alt))
          .attr("class", "turb-symbol")
          .text("^");
      }

      if (avgCloud > 60 && avgTemp <= 0 && avgTemp >= -20 && i % 3 === 0 && alt % 80 === 0) {
        g.append("text")
          .attr("x", xPos + rectWidth/2)
          .attr("y", y(alt))
          .attr("class", "icing-symbol")
          .text("❄");
      }
    }
  }
}

// ========= FREEZING LINE =========
function drawFreezingLine(field) {
  const pts = [];

  field.forEach(pt => {
    const col = pt.column;

    for (let j=0; j<col.length-1; j++) {
      const t1 = col[j].temp;
      const t2 = col[j+1].temp;

      if ((t1>=0 && t2<=0) || (t1<=0 && t2>=0)) {
        const fl = col[j].fl + (0 - t1)*(col[j+1].fl-col[j].fl)/(t2-t1);
        pts.push({time:pt.time, alt:fl});
        break;
      }
    }
  });

  g.append("path")
    .datum(pts)
    .attr("class","freezing-line")
    .attr("d", d3.line().x(d=>x(d.time)).y(d=>y(d.alt)));
}

// ========= FLIGHT PATH =========
function drawFlightPath() {
  const data = [
    {time:0, alt:0},
    {time:7, alt:350},
    {time:63, alt:350},
    {time:70, alt:0}
  ];

  g.append("path")
    .datum(data)
    .attr("class","flight-path")
    .attr("d", d3.line().x(d=>x(d.time)).y(d=>y(d.alt)));
}

// ========= INIT =========
document.getElementById("fileInput").addEventListener("change", async function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const airports = await loadAirportsFromFile(file);

  const start = airports[startICAO];
  const end   = airports[endICAO];

  if (!start || !end) {
    alert("Airport not found in CSV");
    return;
  }

  loadWeather(start, end);
});

</script>
</body>
</html>
