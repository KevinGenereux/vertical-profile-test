<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SIGWX Vertical Profile with Turbulence, Precip & Icing</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
  margin: 0;
  background: #eef2f6;
  font-family: "Courier New", monospace;
}

.axis text { font-size: 12px; }

.grid line {
  stroke: #cfd6dd;
}

.grid-vertical line {
  stroke-dasharray: 4,4;
}

.flight-path {
  stroke: black;
  stroke-width: 3;
  fill: none;
}

.marker {
  fill: red;
  font-weight: bold;
  font-size: 11px;
  text-anchor: middle;
}

/* Turbulence */
.turb-symbol {
  font-size: 18px;
  font-weight: bold;
  fill: #d35400;
}

/* Icing */
.icing-symbol {
  font-size: 14px;
  fill: #00e5ff;
}

.legend text { font-size: 10px; }
</style>
</head>

<body>
<div style="padding: 10px; font-weight: bold;">
Flight Weather Profile: CYYZ → CYUL
</div>

<svg id="chart" width="1000" height="420"></svg>

<script>
const svg = d3.select("#chart");
const margin = {top:20,right:60,bottom:70,left:80};

const width = 1000 - margin.left - margin.right;
const height = 420 - margin.top - margin.bottom;

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${margin.top})`);

const y = d3.scaleLinear().domain([0,500]).range([height,0]);
const x = d3.scaleLinear().domain([-5,75]).range([0,width]);

// GRID
g.append("g")
  .attr("class","grid")
  .call(d3.axisLeft(y).tickValues(d3.range(0,501,100)).tickSize(-width).tickFormat(""));

g.append("g")
  .attr("class","grid grid-vertical")
  .attr("transform",`translate(0,${height})`)
  .call(d3.axisBottom(x).tickValues(d3.range(0,71,10)).tickSize(-height).tickFormat(""));

// AXES
g.append("g")
  .call(d3.axisLeft(y).tickValues(d3.range(0,501,100)).tickFormat(d=>"FL"+d));

const startTime = new Date(Date.now() + 6*3600000);

g.append("g")
  .attr("transform",`translate(0,${height})`)
  .call(
    d3.axisBottom(x)
      .tickValues(d3.range(0,71,10))
      .tickFormat(d=>{
        const t = new Date(startTime.getTime()+d*60000);
        return t.toISOString().substring(11,16)+"Z";
      })
  );

// Labels
g.append("text").attr("x",x(0)).attr("y",height+35).text("CYYZ");
g.append("text").attr("x",x(70)).attr("y",height+35).attr("text-anchor","end").text("CYUL");

// --- COLOR SCALES ---
const cloudColor = d3.scaleLinear()
  .domain([0, 50, 100])
  .range(["rgba(255,255,255,0)", "rgba(140,140,160,0.3)", "rgba(80,80,100,0.7)"]);

const turbColor = d3.scaleLinear()
  .domain([20, 40, 60])
  .range(["rgba(255,255,0,0)", "rgba(255,165,0,0.4)", "rgba(255,0,0,0.5)"])
  .clamp(true);

const precipColor = d3.scaleLinear()
  .domain([0, 2, 10])
  .range([
    "rgba(0,0,255,0)",
    "rgba(0,150,255,0.3)",
    "rgba(0,0,200,0.6)"
  ])
  .clamp(true);

const icingColor = d3.scaleLinear()
  .domain([0, 1])
  .range([
    "rgba(0,255,255,0)",
    "rgba(255,0,255,0.35)"
  ]);

// ROUTE
const start = {lat:43.6777, lon:-79.6248};
const end   = {lat:45.4706, lon:-73.7408};
const samples = 15;

const levels = [
  {p:"1000hPa", fl:30},
  {p:"925hPa",  fl:70},
  {p:"850hPa",  fl:150},
  {p:"700hPa",  fl:300},
  {p:"600hPa",  fl:400},
  {p:"500hPa",  fl:500}
];

function interp(a,b,t){ return a + (b-a)*t; }

async function loadWeather(){
  let field = [];

  for(let i=0; i<samples; i++){
    const t = i/(samples-1);
    const lat = start.lat + (end.lat-start.lat)*t;
    const lon = start.lon + (end.lon-start.lon)*t;

    const cVars = levels.map(l=>"cloudcover_"+l.p).join(",");
    const wVars = levels.map(l=>"windspeed_"+l.p).join(",");
    const tVars = levels.map(l=>"temperature_"+l.p).join(",");
    const pVars = "precipitation";

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=${cVars},${wVars},${tVars},${pVars}&wind_speed_unit=kn&forecast_days=1`;

    try {
      const res = await fetch(url);
      const data = await res.json();

      let column = [];

      levels.forEach(l=>{
        column.push({
          fl: l.fl,
          cloud: data.hourly["cloudcover_"+l.p][0],
          wind: data.hourly["windspeed_"+l.p][0],
          temp: data.hourly["temperature_"+l.p][0]
        });
      });

      const precip = data.hourly.precipitation[0];

      field.push({ time: t*70, column, precip });

    } catch(e) {
      console.error("Fetch error", e);
    }
  }

  drawWeather(field);
}

function drawWeather(field) {
  const dy = 20;

  for(let i=0; i<field.length-1; i++){
    const c1 = field[i];
    const c2 = field[i+1];

    const xPos = x(c1.time);
    const rectWidth = x(c2.time) - x(c1.time) + 1;

    for(let alt=0; alt<=500; alt+=dy){

      const getVals = (col, alt) => {
        for(let j=0; j<col.length-1; j++){
          if(alt>=col[j].fl && alt<=col[j+1].fl){
            const t = (alt-col[j].fl)/(col[j+1].fl-col[j].fl);
            return {
              cloud: interp(col[j].cloud, col[j+1].cloud, t),
              wind: interp(col[j].wind, col[j+1].wind, t),
              temp: interp(col[j].temp, col[j+1].temp, t)
            };
          }
        }
        return {cloud:0, wind:0, temp:0};
      };

      const v1 = getVals(c1.column, alt);
      const v2 = getVals(c2.column, alt);

      const avgCloud = (v1.cloud + v2.cloud) / 2;
      const avgWind  = (v1.wind + v2.wind) / 2;
      const avgTemp  = (v1.temp + v2.temp) / 2;
      const avgPrecip = (c1.precip + c2.precip) / 2;

      // CLOUD
      g.append("rect")
        .attr("x", xPos)
        .attr("y", y(alt+dy))
        .attr("width", rectWidth)
        .attr("height", Math.abs(y(alt) - y(alt+dy)))
        .attr("fill", cloudColor(avgCloud));

      // PRECIP
      if (avgPrecip > 0.1) {
        g.append("rect")
          .attr("x", xPos)
          .attr("y", y(alt+dy))
          .attr("width", rectWidth)
          .attr("height", Math.abs(y(alt) - y(alt+dy)))
          .attr("fill", precipColor(avgPrecip));
      }

      // TURBULENCE
      if (avgWind > 25) {
        g.append("rect")
          .attr("x", xPos)
          .attr("y", y(alt+dy))
          .attr("width", rectWidth)
          .attr("height", Math.abs(y(alt) - y(alt+dy)))
          .attr("fill", turbColor(avgWind));
      }

      // ICING
      const icing =
        avgCloud > 60 &&
        avgTemp <= 0 &&
        avgTemp >= -20;

      if (icing) {
        g.append("rect")
          .attr("x", xPos)
          .attr("y", y(alt+dy))
          .attr("width", rectWidth)
          .attr("height", Math.abs(y(alt) - y(alt+dy)))
          .attr("fill", icingColor(1));
      }

      // TURB SYMBOL
      if (avgWind > 45 && i % 2 === 0 && alt % 60 === 0) {
        g.append("text")
          .attr("x", xPos + rectWidth/2)
          .attr("y", y(alt))
          .attr("class", "turb-symbol")
          .attr("text-anchor", "middle")
          .text("^");
      }

      // ICING SYMBOL
      if (icing && i % 3 === 0 && alt % 80 === 0) {
        g.append("text")
          .attr("x", xPos + rectWidth/2)
          .attr("y", y(alt))
          .attr("class", "icing-symbol")
          .attr("text-anchor", "middle")
          .text("❄");
      }
    }
  }

  drawFlightPath();
}

function drawFlightPath() {
  const flightData = [
    {time:0, alt:0},
    {time:7, alt:350},
    {time:63, alt:350},
    {time:70, alt:0}
  ];

  const line = d3.line()
    .x(d=>x(d.time))
    .y(d=>y(d.alt));

  g.append("path")
    .datum(flightData)
    .attr("class","flight-path")
    .attr("d",line);

  [[7, "TOC"], [63, "TOD"]].forEach(pt => {
    g.append("circle")
      .attr("cx",x(pt[0]))
      .attr("cy",y(350))
      .attr("r",4)
      .attr("fill","red");

    g.append("text")
      .attr("x",x(pt[0]))
      .attr("y",y(350)-10)
      .attr("class","marker")
      .text(pt[1]);
  });
}

loadWeather();
</script>
</body>
</html>
